<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Performance Fueling Plan — Athlete Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4962A;--gold-l:#E8A840;
  --black:#0a0a0a;--white:#f5f3ee;
  --mid:#141414;--mid2:#1c1c1c;
  --border:rgba(212,150,42,0.22);
  --dim:rgba(245,243,238,0.45);--dim2:rgba(245,243,238,0.72);
}
html,body{height:100%;background:var(--black)}
body{color:var(--white);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased}
.shell{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Progress */
.prog-wrap{height:3px;background:rgba(212,150,42,0.12);flex-shrink:0}
.prog-fill{height:3px;background:var(--gold);transition:width .45s cubic-bezier(.4,0,.2,1)}
.prog-label{padding:22px 52px 0;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.7;flex-shrink:0}

/* Step */
.step-outer{flex:1;overflow-y:auto;padding:40px 52px 20px}
.step-inner{animation:none}
.step-inner.page-enter{animation:up .3s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes condIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.headline{font-family:'Bebas Neue','Arial Narrow',Arial,sans-serif;font-size:clamp(52px,8vw,78px);line-height:.95;letter-spacing:.02em;color:var(--white);margin-bottom:14px}
.sub{font-size:17px;color:var(--dim);margin-bottom:36px;line-height:1.65;max-width:560px}

/* Question blocks */
.q{margin-bottom:28px}
.q-label{display:block;font-size:15px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.q-sub{display:block;font-size:14px;color:var(--dim);margin-bottom:10px;margin-top:-6px}

/* Inputs */
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=time]{
  width:100%;background:var(--mid);border:.5px solid var(--border);color:var(--white);
  font-family:'DM Sans',sans-serif;font-size:17px;font-weight:300;
  padding:16px 18px;outline:none;transition:border-color .2s;
  -webkit-appearance:none;border-radius:0;
}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--dim)}
input.invalid{border-color:#e57373!important}
.email-err{font-size:13px;color:#e57373;margin-top:6px;letter-spacing:.04em;display:none}
.email-err.show{display:block}

/* DOB split inputs */
.dob-row{display:flex;gap:10px;align-items:flex-end}
.dob-field{display:flex;flex-direction:column;gap:6px}
.dob-field label{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);opacity:.8}
.dob-field input{width:100%;background:var(--mid);border:.5px solid var(--border);color:var(--white);font-family:'DM Sans',sans-serif;font-size:17px;font-weight:300;padding:16px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0;text-align:center}
.dob-field input:focus{border-color:var(--gold)}
.dob-sep{font-size:18px;color:var(--dim);padding-bottom:16px;flex-shrink:0}

/* Time slider */
.ts-wrap{display:flex;flex-direction:column;gap:10px}
.ts-display{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--white);letter-spacing:.05em;line-height:1}
.ts-group{margin-bottom:22px}
.ts-group-label{font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;display:block}
.ts-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.ts-row-label{font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);width:110px;flex-shrink:0}
.ts-row-right{flex:1;display:flex;flex-direction:column;gap:8px}
.ts-row-display{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:.05em;line-height:1}
input[type=range].ts-input{width:100%;-webkit-appearance:none;appearance:none;height:3px;outline:none;border-radius:0;cursor:pointer;border:none;padding:0;background:var(--mid2)}
input[type=range].ts-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--gold);cursor:pointer;border-radius:0}
input[type=range].ts-input::-moz-range-thumb{width:18px;height:18px;background:var(--gold);cursor:pointer;border-radius:0;border:none}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.5) sepia(1) hue-rotate(25deg) saturate(3);opacity:.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.row2 .ig label{display:block;font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;opacity:.85}

/* Yes/No */
.yn{display:flex;gap:10px}
.yn-btn{flex:1;padding:16px;border:.5px solid var(--border);background:var(--mid);color:var(--dim2);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .18s;border-radius:0}
.yn-btn.on{background:var(--gold);color:var(--black);border-color:var(--gold)}
.yn-btn:not(.on):hover{border-color:rgba(212,150,42,.5);color:var(--white)}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:10px}
.pill{padding:12px 20px;border:.5px solid var(--border);background:var(--mid);color:var(--dim2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:400;cursor:pointer;transition:all .18s;white-space:nowrap;border-radius:0}
.pill.on{background:rgba(212,150,42,.12);border-color:var(--gold);color:var(--white)}
.pill:not(.on):hover{border-color:rgba(212,150,42,.45);color:var(--white)}

/* Stepper */
.stepper{display:flex;align-items:center;gap:18px}
.sb{width:46px;height:46px;border:.5px solid var(--border);background:var(--mid2);color:var(--white);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .2s;border-radius:0;font-family:monospace}
.sb:hover{border-color:var(--gold)}
.sv{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--white);min-width:40px;text-align:center}
.su{font-size:14px;color:var(--dim);letter-spacing:.06em}

/* Sport cards */
.sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{padding:22px 20px;border:.5px solid var(--border);background:var(--mid);cursor:pointer;transition:all .2s}
.sc.on{border-color:var(--gold);background:rgba(212,150,42,.09)}
.sc:not(.on):hover{border-color:rgba(212,150,42,.4)}
.sc-title{font-size:17px;font-weight:500;color:var(--white);margin-bottom:6px}
.sc-ex{font-size:14px;color:var(--dim);line-height:1.4}

/* Cond / Div */
.cond{margin-top:14px;padding-left:20px;border-left:1px solid var(--border);animation:condIn .25s ease both}
.divider{height:.5px;background:var(--border);margin:6px 0 24px}
.conf{font-size:13px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;padding:12px 16px;border:.5px solid var(--border);background:rgba(212,150,42,.05);margin-bottom:24px}

/* Nav */
.nav{display:flex;gap:12px;padding:16px 52px 44px;flex-shrink:0}
.nb,.nn{flex:1;padding:18px;border:.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:0}
.nb{background:transparent;color:var(--dim2)}
.nb:hover:not(:disabled){border-color:var(--gold);color:var(--white)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nn{background:var(--gold);border-color:var(--gold);color:var(--black)}
.nn:hover:not(:disabled){background:var(--gold-l)}
.nn:disabled{opacity:.35;cursor:not-allowed}

/* Loading / result */
.loading{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100}
.spinner{width:40px;height:40px;border:1.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 32px;gap:18px}
.r-icon{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold)}
.r-title{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--white)}
.r-sub{font-size:13px;color:var(--dim);max-width:320px;line-height:1.65}
.r-err{color:#e57373;font-size:12px;max-width:340px;line-height:1.6}

@media(max-width:640px){
  /* Layout & spacing */
  .step-outer{padding:24px 24px 16px}
  .nav{padding:12px 20px 32px}
  .prog-label{padding:14px 24px 0}
  .nb,.nn{padding:15px 10px;font-size:12px}

  /* Typography */
  .sub{font-size:15px;margin-bottom:24px;max-width:100%}
  .q-label{font-size:13px}
  .q-sub{font-size:12px}
  .conf{font-size:12px}

  /* Grid collapses */
  .sport-grid{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr;margin-bottom:20px}

  /* DOB — flex instead of fixed widths */
  .dob-row{gap:6px}
  .dob-field{flex:1;min-width:0}
  .dob-field input{padding:12px 6px;font-size:16px}
  .dob-sep{font-size:14px;padding-bottom:13px}

  /* Inputs */
  input[type=text],input[type=email],input[type=tel],
  input[type=date],input[type=time]{padding:14px 14px;font-size:16px}

  /* Pills */
  .pills{gap:8px}
  .pill{padding:10px 14px;font-size:13px}

  /* Yes / No */
  .yn-btn{padding:14px;font-size:14px}

  /* Stepper */
  .sb{width:42px;height:42px;font-size:22px}
  .sv{font-size:30px}

  /* Sport cards */
  .sc{padding:16px 14px}
  .sc-title{font-size:15px}
  .sc-ex{font-size:13px}

  /* Time sliders */
  .ts-display{font-size:34px}
  .ts-row{flex-direction:column;align-items:flex-start;gap:6px;margin-bottom:22px}
  .ts-row-label{width:auto}
  .ts-row-right{width:100%}
  input[type=range].ts-input::-webkit-slider-thumb{width:26px;height:26px}
  input[type=range].ts-input::-moz-range-thumb{width:26px;height:26px}

  /* Cond indent */
  .cond{padding-left:12px}
}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-label" id="pl"></div>
  <div class="step-outer" id="so"><div class="step-inner" id="si"></div></div>
  <div class="nav" id="nav"></div>
</div>

<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('shell').innerHTML =
    '<div style="color:#e57373;padding:32px;font-family:sans-serif;font-size:14px;line-height:1.6">' +
    '<strong>Error loading form</strong><br><br>' + msg +
    '<br><small style=\"opacity:.6\">' + src + ' line ' + line + '</small></div>';
  return true;
};
const ENDPOINT = 'https://athlete-fueling-api.onrender.com/submit';

/* ── STATE ─────────────────────────────────────────────────────────────── */
const D = {
  first_name:'',last_name:'',email:'',
  sex:'',dob:'',height:'',weight:'',
  sport:'',position:'',
  sport_type:'',
  season_phase:'',training_days:5,session_length:'',
  does_lift:null,lift_days:3,
  has_game_days:null,game_days:[],training_env:'',
  comp_scheduled:null,comp_name:'',weeks_out:'',prep_phase:'',current_focus:'',
  strength_days:4,strength_session:'',training_split:'',
  weight_cut:null,weight_cut_details:'',combat_phase:'',combat_days:5,combat_session:'',
  endurance_discipline:'',endurance_season:'',endurance_days:5,endurance_session:'',
  endurance_lift:null,endurance_lift_days:2,
  has_race:null,race_event:'',race_weeks_out:'',has_gi_issues:null,
  uses_in_session_fuel:null,in_session_fuel:'',
  has_injury:null,injury_details:'',primary_goal:'',
  eats_breakfast:null,typical_breakfast:'',eats_pre_workout:null,typical_lunch:'',
  typical_dinner:'',has_snacks:null,typical_snacks:'',
  has_allergies:null,allergies:[],has_diet_restrictions:null,diet_restrictions:[],
  has_disliked_foods:null,disliked_foods:'',
  takes_sups:null,sups:[],other_sups:'',
  sleep_hours:7,has_medical:null,medical_details:'',
  ped_approach:'',ped_compounds:'',
  _dob_mm:'',_dob_dd:'',_dob_yyyy:'',
  school_start_min:480,school_end_min:900,practice_start_min:900,practice_end_min:1080,
  breakfast_time:420,lunch_time:720,dinner_time:1080,
  other_split:'',other_endurance_disc:'',
  uses_tracker:null,tracker_type:'',
  active_cals_training:'',active_cals_rest:'',rhr:'',
  has_body_comp:null,lean_mass:'',body_fat_pct:'',
  tracks_hrv:null,hrv_baseline:'',
  has_vo2max:null,vo2max:'',
  student_status:'',
  college_schedule_pattern:'',
  has_dining_hall:null,dining_hall_hours:'',
  college_practice_varies:null,college_practice_detail:'',
  work_from_home:null,
  daily_routine_notes:''
};

let idx = 0;

function steps() {
  const b = ['contact','bio','profile','sport-type'];
  const br = {
    team:      ['season','lifting','gamedays'],
    strength:  ['str-comp','str-train'],
    combat:    ['combat'],
    endurance: ['end-train','end-race']
  };
  const t = ['schedule','goals','injury','sleep','tracker','restrictions','eating-am','eating-pm','snacks','sups','ped'];
  return [...b,...(br[D.sport_type]||[]),...t];
}

/* ── HELPERS ──────────────────────────────────────────────────────────── */
function s(k,v){D[k]=v;updateStep()}
function bump(k,d,mn,mx){D[k]=Math.min(mx,Math.max(mn,D[k]+d));updateStep()}
function tog(k,v){const i=D[k].indexOf(v);D[k]=i>-1?D[k].filter(x=>x!==v):[...D[k],v];updateStep()}

/* ── COMPONENT BUILDERS ───────────────────────────────────────────────── */
function req(lbl){return `${lbl} <span style="color:var(--gold);font-size:11px">*</span>`}

function YN(k,lbl,sub='',required=false){
  const l=required?req(lbl):lbl;
  return `<div class="q">
    <span class="q-label">${l}</span>${sub?`<span class="q-sub">${sub}</span>`:''}
    <div class="yn">
      <button class="yn-btn${D[k]===true?' on':''}" onclick="s('${k}',true)">Yes</button>
      <button class="yn-btn${D[k]===false?' on':''}" onclick="s('${k}',false)">No</button>
    </div></div>`;
}

function P(k,lbl,opts,multi=false,required=false){
  const l=required?req(lbl):lbl;
  return `<div class="q"><span class="q-label">${l}</span>
    <div class="pills">${opts.map(o=>{
      const on=multi?(Array.isArray(D[k])&&D[k].includes(o)):D[k]===o;
      const fn=multi?`tog('${k}','${o}')`:`s('${k}','${o}')`;
      return `<button class="pill${on?' on':''}" onclick="${fn}">${o}</button>`;
    }).join('')}</div></div>`;
}

function T(k,lbl,ph,type='text',required=false){
  const l=required?req(lbl):lbl;
  return `<div class="q"><span class="q-label">${l}</span>
    <input type="${type}" placeholder="${ph}" value="${esc(D[k]||'')}" autocomplete="new-password" oninput="D['${k}']=this.value;updateNav()"></div>`;
}

function R2(fields){
  return `<div class="row2">${fields.map(f=>`<div class="ig">
    <label>${f.req?req(f.l):f.l}</label>
    <input type="${f.t||'text'}" placeholder="${f.ph}" value="${esc(D[f.k]||'')}" autocomplete="new-password" oninput="D['${f.k}']=this.value;updateNav()">
  </div>`).join('')}</div>`;
}

function St(k,lbl,mn,mx,unit,required=false){
  const l=required?req(lbl):lbl;
  return `<div class="q"><span class="q-label">${l}</span>
    <div class="stepper">
      <button class="sb" onclick="bump('${k}',-1,${mn},${mx})">&#8722;</button>
      <span class="sv">${D[k]}</span>
      <button class="sb" onclick="bump('${k}',1,${mn},${mx})">&#43;</button>
      <span class="su">${unit}</span>
    </div></div>`;
}

function updateNav(){
  const ss=steps(),total=ss.length,k=ss[idx];
  const last=idx===total-1;
  const missing=missingOnStep(k);

  document.getElementById('nav').innerHTML=`
    <button class="nb" ${idx===0?'disabled':''} onclick="go(-1)">&#8592; Back</button>
    <button class="nn" onclick="${last?'trySubmit()':'go(1)'}">${last?'Submit &#10003;':'Next &#8594;'}</button>`;
}

function C(show,html){return show?`<div class="cond">${html}</div>`:''}
function Dv(){return '<div class="divider"></div>'}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

/* ── TIME SLIDER HELPERS ────────────────────────────────────────────── */
function minsToTime(m){
  const h=Math.floor(m/60),min=m%60,ap=h>=12?'PM':'AM',h12=h>12?h-12:(h===0?12:h);
  return h12+':'+(min<10?'0':'')+min+' '+ap;
}
function onTS(k,el){
  D[k]=parseInt(el.value);
  const disp=document.getElementById('ts-'+k);
  if(disp) disp.textContent=minsToTime(D[k]);
  const pct=(el.value-el.min)/(el.max-el.min)*100;
  el.style.background='linear-gradient(to right,var(--gold) '+pct+'%,var(--mid2) '+pct+'%)';
  updateNav();
}
function TS(k,lbl,required=false){
  if(D[k]===undefined||D[k]===null) D[k]=720;
  const val=D[k],pct=(val-300)/(1380-300)*100,l=required?req(lbl):lbl;
  const style=`background:linear-gradient(to right,var(--gold) ${pct}%,var(--mid2) ${pct}%)`;
  return `<div class="q"><span class="q-label">${l}</span><div class="ts-wrap"><div class="ts-display" id="ts-${k}">${minsToTime(val)}</div><input type="range" class="ts-input" min="300" max="1380" step="15" value="${val}" style="${style}" oninput="onTS('${k}',this)"></div></div>`;
}
function TSrow(k,lbl){
  if(D[k]===undefined||D[k]===null) D[k]=720;
  const val=D[k],pct=(val-300)/(1380-300)*100;
  const style=`background:linear-gradient(to right,var(--gold) ${pct}%,var(--mid2) ${pct}%)`;
  return `<div class="ts-row"><div class="ts-row-label">${lbl}</div><div class="ts-row-right"><div class="ts-row-display" id="ts-${k}">${minsToTime(val)}</div><input type="range" class="ts-input" min="300" max="1380" step="15" value="${val}" style="${style}" oninput="onTS('${k}',this)"></div></div>`;
}

/* ── TRACKER HINT ───────────────────────────────────────────────────── */
function trackerCalHint(){
  const hints={
    'Apple Watch':'Apple Watch: Fitness app → Activity → Active Calories.',
    'Garmin':'Garmin Connect: My Day → scroll to Calories.',
    'Whoop':'Whoop: Strain tab → Calories burned.',
    'Oura':'Oura: Activity tab → Active Calories.',
  };
  const note=hints[D.tracker_type]||'';
  return `<div class="conf">${note} Look for Active Calories — not Total Calories. The difference can be 400–800 kcal and changes your entire daily target.</div>`;
}

/* ── SCHEDULE CONTENT BY SITUATION ─────────────────────────────────── */
function scheduleContent(){
  const st = D.student_status;

  if(!st || st === 'High school athlete'){
    return (
      '<div class="ts-group"><span class="ts-group-label">School</span>' +
      TSrow('school_start_min','Start') + TSrow('school_end_min','End') + '</div>' +
      '<div class="ts-group"><span class="ts-group-label">Practice or training</span>' +
      TSrow('practice_start_min','Start') + TSrow('practice_end_min','End') + '</div>'
    );
  }

  if(st === 'College athlete'){
    return (
      '<div class="q"><span class="q-label">Weekly class schedule</span>' +
      '<span class="q-sub">Describe your typical week — which days classes fall on and approximate times. This is what allows meals to be placed around your actual schedule rather than a single fixed window.</span>' +
      '<input type="text" placeholder="e.g. MWF classes 9am–noon, TTh classes 11am–2pm" value="' + esc(D.college_schedule_pattern) + '" autocomplete="new-password" oninput="D.college_schedule_pattern=this.value;updateNav()"></div>' +
      '<div class="ts-group"><span class="ts-group-label">Practice or training</span>' +
      TSrow('practice_start_min','Typical start') + TSrow('practice_end_min','Typical end') + '</div>' +
      YN('college_practice_varies','Does your practice time vary significantly by day?') +
      C(D.college_practice_varies===true, T('college_practice_detail','How does it vary?','e.g. Lift at 6am MWF, full practice TTh 4–6pm')) +
      Dv() +
      YN('has_dining_hall','Do you eat at a campus dining hall?','Meal plan and dining hall hours affect what foods are actually available to you') +
      C(D.has_dining_hall===true, T('dining_hall_hours','What are the dining hall hours?','e.g. 7–10am, 11am–2pm, 5–8pm'))
    );
  }

  if(st === 'Working professional'){
    return (
      '<div class="ts-group"><span class="ts-group-label">Work hours</span>' +
      TSrow('school_start_min','Start') + TSrow('school_end_min','End') + '</div>' +
      YN('work_from_home','Do you work from home or remotely?','Affects your access to food and ability to eat on a schedule during the day') +
      Dv() +
      '<div class="ts-group"><span class="ts-group-label">Training</span>' +
      TSrow('practice_start_min','When do you typically train?') + '</div>'
    );
  }

  if(st === 'Not currently in school'){
    return (
      '<div class="ts-group"><span class="ts-group-label">Training</span>' +
      TSrow('practice_start_min','When do you typically train?') + '</div>' +
      Dv() +
      '<div class="q"><span class="q-label">Daily routine (optional)</span>' +
      '<span class="q-sub">Any regular commitments that affect when you can eat or prep food — shift work, irregular hours, frequent travel.</span>' +
      '<input type="text" placeholder="e.g. Night shift nurse, eating windows before 6am and after 8pm" value="' + esc(D.daily_routine_notes) + '" autocomplete="new-password" oninput="D.daily_routine_notes=this.value;updateNav()"></div>'
    );
  }

  return '';
}

/* ── REQUIRED FIELDS PER STEP ────────────────────────────────────────── */
const REQUIRED = {
  'contact':    () => [
    [D.first_name.trim(), 'First Name'],
    [D.email.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D.email), 'Email Address (must be valid)'],
  ],
  'bio':        () => [
    [D.sex, 'Biological Sex'],
    [D.dob && /^\d{4}-\d{2}-\d{2}$/.test(D.dob), 'Date of Birth'],
    [D.height.trim(), 'Height'],
    [D.weight.trim(), 'Weight'],
  ],
  'profile':    () => [
    [D.sport.trim(), 'Sport'],
    [D.student_status, 'Current situation'],
  ],
  'sport-type': () => [
    [D.sport_type, 'Sport category'],
  ],
  'season':     () => [
    [D.season_phase, 'Current Season Phase'],
    [D.session_length, 'Typical Session Length'],
  ],
  'str-comp':   () => [
    [D.comp_scheduled !== null, 'Competition scheduled (Yes or No)'],
  ],
  'str-train':  () => [
    [D.strength_session, 'Typical session length'],
    [D.training_split, 'Training split'],
  ],
  'combat':     () => [
    [D.combat_phase, 'Current phase'],
    [D.weight_cut !== null, 'Weight cut (Yes or No)'],
  ],
  'end-train':  () => [
    [D.endurance_discipline, 'Primary discipline'],
    [D.endurance_season, 'Season phase'],
    [D.endurance_session, 'Typical session length'],
  ],
  'goals':      () => [
    [D.primary_goal, 'Primary Goal'],
  ],
  'eating-pm':  () => [
    [D.typical_dinner.trim(), 'Typical dinner'],
  ],
  'snacks': () => [],
  'sleep':      () => [
    [D.sleep_hours >= 4, 'Average sleep hours'],
  ],
};

function missingOnStep(k) {
  const check = REQUIRED[k];
  if (!check) return [];
  return check().filter(([v]) => !v).map(([,label]) => label);
}

function allMissing() {
  const ss = steps();
  const missing = [];
  ss.forEach(k => {
    const m = missingOnStep(k);
    if (m.length) missing.push({ step: k, stepIdx: ss.indexOf(k), fields: m });
  });
  return missing;
}

function updateNav(){
  const ss=steps(),total=ss.length,k=ss[idx];
  const last=idx===total-1;
  const missing=missingOnStep(k);

  document.getElementById('nav').innerHTML = `
    <button class="nb" ${idx===0?'disabled':''} onclick="go(-1)">&#8592; Back</button>
    <button class="nn" onclick="${last?'trySubmit()':'go(1)'}">${last?'Submit &#10003;':'Next &#8594;'}</button>`;
}

/* ── SUBMIT WITH FULL VALIDATION ────────────────────────────────────── */
function trySubmit(){
  const problems = allMissing();
  if(problems.length === 0){ submit(); return; }

  // Jump to first incomplete step
  const first = problems[0];
  idx = first.stepIdx;
  render();

  // Flash a message
  const nav = document.getElementById('nav');
  const msg = document.createElement('div');
  msg.style.cssText='font-size:11px;color:#e57373;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:0 0 10px;animation:condIn .3s ease both';
  msg.textContent = `Please complete: ${first.fields.join(', ')}`;
  nav.prepend(msg);
  setTimeout(()=>msg.remove(), 4000);
}

/* ── SUBMIT ──────────────────────────────────────────────────────────── */
async function submit(){
  document.getElementById('shell').innerHTML=`
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-txt">Submitting your intake...</div>
    </div>`;

  try{
    const res=await fetch(ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(D)
    });
    if(!res.ok) throw new Error('Server error '+res.status);

    document.getElementById('shell').innerHTML=`
      <div class="prog-wrap"><div class="prog-fill" style="width:100%"></div></div>
      <div class="result">
        <div class="r-icon">&#10003;</div>
        <div class="r-title">You're done.</div>
        <div class="r-sub">Your personalized performance fueling plan is being built now and will arrive at <strong>${D.email}</strong> within 24 hours.<br><br>One free revision included within 14 days.</div>
      </div>`;
  }catch(err){
    document.getElementById('shell').innerHTML=`
      <div class="prog-wrap"><div class="prog-fill" style="width:95%"></div></div>
      <div class="result">
        <div class="r-icon" style="color:#e57373">!</div>
        <div class="r-title">Something went wrong.</div>
        <div class="r-err">We couldn't submit your form. Please try again or reach out to us directly.<br><br><small>${err.message}</small></div>
        <button class="nn" style="max-width:200px;margin-top:12px" onclick="location.reload()">Try again</button>
      </div>`;
  }
}

/* ── EMAIL VALIDATION ───────────────────────────────────────────────── */
function handleEmail(el){
  D.email = el.value;
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value);
  const err = document.getElementById('email-err');
  if(el.value.length > 0 && !valid){
    el.classList.add('invalid');
    if(err) err.classList.add('show');
  } else {
    el.classList.remove('invalid');
    if(err) err.classList.remove('show');
  }
  updateNav();
}

function dobInput(el, selfId, nextId, maxLen){
  // Strip non-digits
  el.value = el.value.replace(/\D/g,'');
  const key = '_' + selfId.replace('-','_');
  D[key] = el.value;

  // Assemble dob string when all three are filled
  const mm = D._dob_mm, dd = D._dob_dd, yyyy = D._dob_yyyy;
  if(mm.length===2 && dd.length===2 && yyyy.length===4){
    D.dob = yyyy + '-' + mm + '-' + dd;
  } else {
    D.dob = '';
  }

  // Auto-advance to next field when full
  if(el.value.length === maxLen && nextId){
    const next = document.getElementById(nextId);
    if(next) next.focus();
  }
  updateNav();
}

/* ── RENDER ──────────────────────────────────────────────────────────── */
function render(){
  const ss=steps(),total=ss.length,k=ss[idx];
  const pct=Math.round((idx/(total-1))*100);
  const last=idx===total-1;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=`Step ${idx+1} of ${total}`;
  const fn=SCR[k];
  const so=document.getElementById('so');
  so.innerHTML=`<div class="step-inner page-enter" id="si">${fn?fn():''}</div>`;
  updateNav();
}

function updateStep(){
  const ss=steps(),k=ss[idx];
  const fn=SCR[k];
  const so=document.getElementById('so');
  so.innerHTML=`<div class="step-inner" id="si">${fn?fn():''}</div>`;
  updateNav();
}

function go(dir){
  const ss=steps();
  if(dir===-1&&idx>0){idx--;render();window.scrollTo(0,0);return}
  if(dir===1&&idx<ss.length-1){idx++;render();window.scrollTo(0,0)}
}

render();
</script>
